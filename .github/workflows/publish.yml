# Publish on tag push.
#
# Trigger:  push a tag like `v0.1.0-alpha.2` (or `v0.2.0` for stable).
# Effect:   publish the matching version to BOTH crates.io and npm,
#           skipping either side if the version is already up there.
#
# Tag → version: the leading `v` is stripped; the rest must match
# `Cargo.toml`'s `version` field exactly. Mismatch fails the build,
# so a typo in the tag won't quietly publish the wrong thing.
#
# Pre-release vs stable: any version with a hyphen (`-alpha.N`,
# `-beta.N`, `-rc.N`) is published to npm under the `alpha` dist-tag
# and crates.io picks it up as a pre-release automatically. Stable
# versions land on `latest`.
#
# Required secrets in repo settings → Actions → Secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token (Account → API Tokens)
#   NPM_TOKEN             — npm granular access token with
#                           "Bypass two-factor authentication" enabled
#                           and read+write access to mapky-app-specs

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v${{ steps.version.outputs.version }} does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Run Rust tests
        run: cargo test

      - name: Publish to crates.io (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Try to publish; treat "already exists" as success so re-runs of
          # the workflow on the same tag don't fail when one side (npm) has
          # to re-publish but crates.io is already done.
          set +e
          OUT=$(cargo publish 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -eq 0 ]; then
            exit 0
          fi
          if echo "$OUT" | grep -qE "already (exists|uploaded)"; then
            echo "::notice::version already on crates.io — treating as success"
            exit 0
          fi
          exit $STATUS

      - name: Build WASM package
        run: wasm-pack build --target bundler --release

      - name: Publish to npm (idempotent)
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Same approach as crates.io: try to publish, treat the
          # "version already published" error as success.
          set +e
          OUT=$(npm publish --access public --tag ${{ steps.version.outputs.npm_tag }} 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -eq 0 ]; then
            exit 0
          fi
          if echo "$OUT" | grep -qE "(cannot publish over the previously published|EPUBLISHCONFLICT|previously published versions|You cannot publish over the previously)"; then
            echo "::notice::version already on npm — treating as success"
            exit 0
          fi
          exit $STATUS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
